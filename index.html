<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Schemaläggning - Vårdcentral</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        * {
            -webkit-tap-highlight-color: transparent;
        }
        
        .schedule-grid {
            display: grid;
            grid-template-columns: auto repeat(auto-fit, minmax(60px, 1fr));
            gap: 0;
            font-size: 0.875rem;
        }
        
        .slot {
            min-height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px solid #e5e7eb;
            cursor: pointer;
            transition: all 0.2s;
            padding: 4px;
            text-align: center;
            font-weight: 500;
        }
        
        .slot:hover {
            background-color: #f3f4f6;
        }
        
        .slot-activity {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 4px;
            color: white;
            font-size: 0.75rem;
            font-weight: bold;
        }
        
        .activity-akut { background-color: #10b981; }
        .activity-teleq { background-color: #3b82f6; }
        .activity-mottagning { background-color: #ef4444; }
        .activity-admin { background-color: #f59e0b; }
        .activity-recept { background-color: #8b5cf6; }
        .activity-telefon { background-color: #06b6d4; }
        .activity-mote { background-color: #ec4899; }
        .activity-chefstid { background-color: #6b7280; }
        .activity-ledig { background-color: #d1d5db; color: #6b7280; }
        
        .lunch-slot {
            background-color: #fef3c7 !important;
        }
        
        .warning-badge {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 0.75rem;
            font-weight: bold;
        }
        
        .warning-critical {
            background-color: #fee2e2;
            color: #991b1b;
        }
        
        .warning-alert {
            background-color: #fef3c7;
            color: #92400e;
        }
    </style>
</head>
<body class="bg-gray-50">
    <div id="app"></div>

    <script type="module">
        // ============================================
        // TYPES & CONSTANTS
        // ============================================
        
        const STAFF = ['Josefine', 'Max', 'Jens', 'Rita', 'Sara', 'Tom', 'Ingrid', 'Helena', 'Sandra'];
        const DAYS = ['Mån', 'Tis', 'Ons', 'Tor', 'Fre'];
        const TIME_SLOTS = ['07:30', '08:00', '08:30', '09:00', '09:30', '10:00', '10:30', '11:00', '11:30', '12:00', '12:30', '13:00', '13:30', '14:00', '14:30', '15:00', '15:30', '16:00', '16:30', '17:00'];
        
        const ACTIVITIES = {
            AKUT: 'Akut',
            TELEQ: 'TeleQ',
            MOTTAGNING: 'Mottagning',
            ADMIN: 'Admin',
            RECEPT: 'Recept',
            TELEFON: 'Telefon',
            MOTE: 'Möte',
            CHEFSTID: 'Chefstid',
            LEDIG: 'Ledig'
        };
        
        const ACTIVITY_OPTIONS = [
            ACTIVITIES.AKUT,
            ACTIVITIES.TELEQ,
            ACTIVITIES.MOTTAGNING,
            ACTIVITIES.ADMIN,
            ACTIVITIES.RECEPT,
            ACTIVITIES.TELEFON,
            ACTIVITIES.MOTE,
            ACTIVITIES.CHEFSTID,
            ACTIVITIES.LEDIG
        ];
        
        const LUNCH_TIMES = ['12:00', '12:30'];
        
        const FIXED_SLOTS = {
            'odd': {
                'Max': [
                    { day: 'Tis', start: '08:30', end: '09:30', name: 'Synergimöte' },
                    { day: 'Tis', start: '13:00', end: '14:30', name: 'Hemsjukvård' },
                    { day: 'Ons', start: '08:00', end: '12:00', name: 'BVC' }
                ],
                'Jens': [
                    { day: 'Tis', start: '09:00', end: '12:00', name: 'Lillåhem-rond' },
                    { day: 'Ons', start: '08:00', end: '12:00', name: 'BVC' }
                ],
                'Sara': [
                    { day: 'Ons', start: '09:00', end: '12:00', name: 'Orsagården' }
                ],
                'Josefine': [
                    { day: 'Ons', start: '13:00', end: '15:00', name: 'MVC' }
                ],
                'Helena': [
                    { day: 'Tor', start: '09:00', end: '12:00', name: 'Skolläkare' }
                ]
            },
            'even': {
                'Max': [
                    { day: 'Tis', start: '08:30', end: '09:30', name: 'Synergimöte' },
                    { day: 'Tis', start: '13:00', end: '14:30', name: 'Hemsjukvård' },
                    { day: 'Ons', start: '08:00', end: '12:00', name: 'BVC' }
                ],
                'Jens': [
                    { day: 'Tis', start: '09:00', end: '12:00', name: 'Lillåhem-rond' }
                ],
                'Sara': [
                    { day: 'Ons', start: '09:00', end: '12:00', name: 'Orsagården' }
                ],
                'Rita': [
                    { day: 'Ons', start: '13:00', end: '15:00', name: 'MVC' }
                ],
                'Helena': [
                    { day: 'Tor', start: '09:00', end: '12:00', name: 'Skolläkare' }
                ]
            }
        };
        
        // ============================================
        // STATE MANAGEMENT
        // ============================================
        
        class ScheduleStore {
            constructor() {
                this.schedule = this.loadSchedule();
                this.workingHours = this.loadWorkingHours();
                this.currentWeek = 'odd';
                this.currentDay = this.loadCurrentDay();
                this.listeners = [];
            }
            
            loadSchedule() {
                const stored = localStorage.getItem('schedule');
                if (stored) return JSON.parse(stored);
                
                const empty = {};
                STAFF.forEach(person => {
                    empty[person] = {};
                    DAYS.forEach(day => {
                        empty[person][day] = {};
                        TIME_SLOTS.forEach(slot => {
                            empty[person][day][slot] = ACTIVITIES.LEDIG;
                        });
                    });
                });
                return empty;
            }
            
            loadWorkingHours() {
                const stored = localStorage.getItem('workingHours');
                if (stored) return JSON.parse(stored);
                
                const defaults = {};
                STAFF.forEach(person => {
                    defaults[person] = {
                        'odd': { Mån: '07:30-17:00', Tis: '07:30-17:00', Ons: '07:30-17:00', Tor: '07:30-17:00', Fre: '07:30-17:00' },
                        'even': { Mån: '07:30-17:00', Tis: '07:30-17:00', Ons: '07:30-17:00', Tor: '07:30-17:00', Fre: '07:30-17:00' }
                    };
                });
                return defaults;
            }

            loadCurrentDay() {
                const stored = localStorage.getItem('currentDay');
                return DAYS.includes(stored) ? stored : DAYS[0];
            }
            
            saveSchedule() {
                localStorage.setItem('schedule', JSON.stringify(this.schedule));
                this.notifyListeners();
            }
            
            saveWorkingHours() {
                localStorage.setItem('workingHours', JSON.stringify(this.workingHours));
                this.notifyListeners();
            }

            saveCurrentDay() {
                localStorage.setItem('currentDay', this.currentDay);
                this.notifyListeners();
            }
            
            setActivity(person, day, time, activity) {
                if (!this.schedule[person][day]) this.schedule[person][day] = {};
                this.schedule[person][day][time] = activity;
                this.saveSchedule();
            }
            
            getActivity(person, day, time) {
                return this.schedule[person]?.[day]?.[time] || ACTIVITIES.LEDIG;
            }
            
            setWorkingHours(person, week, day, hours) {
                if (!this.workingHours[person]) this.workingHours[person] = {};
                if (!this.workingHours[person][week]) this.workingHours[person][week] = {};
                this.workingHours[person][week][day] = hours;
                this.saveWorkingHours();
            }
            
            getWorkingHours(person, week, day) {
                return this.workingHours[person]?.[week]?.[day] || '07:30-17:00';
            }
            
            setWeek(week) {
                this.currentWeek = week;
                this.notifyListeners();
            }

            setCurrentDay(day) {
                this.currentDay = day;
                this.saveCurrentDay();
            }

            getCurrentDay() {
                return this.currentDay;
            }
            
            subscribe(listener) {
                this.listeners.push(listener);
                return () => {
                    this.listeners = this.listeners.filter(l => l !== listener);
                };
            }
            
            notifyListeners() {
                this.listeners.forEach(listener => listener());
            }
        }
        
        const store = new ScheduleStore();
        
        // ============================================
        // UTILITIES
        // ============================================
        
        function timeToMinutes(timeStr) {
            const [h, m] = timeStr.split(':').map(Number);
            return h * 60 + m;
        }
        
        function isLunchTime(time) {
            return LUNCH_TIMES.includes(time);
        }
        
        function isPersonWorking(person, day, time) {
            const hours = store.getWorkingHours(person, store.currentWeek, day);
            if (hours === 'Ledig') return false;
            
            const [start, end] = hours.split('-');
            const slotStart = timeToMinutes(start);
            const slotEnd = timeToMinutes(end);
            const slotTime = timeToMinutes(time);
            
            return slotTime >= slotStart && slotTime < slotEnd;
        }
        
        function isFixedSlot(person, day, time) {
            const fixed = FIXED_SLOTS[store.currentWeek][person] || [];
            return fixed.some(slot => {
                if (slot.day !== day) return false;
                const slotStart = timeToMinutes(slot.start);
                const slotEnd = timeToMinutes(slot.end);
                const slotTime = timeToMinutes(time);
                return slotTime >= slotStart && slotTime < slotEnd;
            });
        }
        
        function getFixedSlotName(person, day, time) {
            const fixed = FIXED_SLOTS[store.currentWeek][person] || [];
            const slot = fixed.find(s => {
                if (s.day !== day) return false;
                const slotStart = timeToMinutes(s.start);
                const slotEnd = timeToMinutes(s.end);
                const slotTime = timeToMinutes(time);
                return slotTime >= slotStart && slotTime < slotEnd;
            });
            return slot?.name || '';
        }
        
        function getActivityClass(activity) {
            const map = {
                [ACTIVITIES.AKUT]: 'activity-akut',
                [ACTIVITIES.TELEQ]: 'activity-teleq',
                [ACTIVITIES.MOTTAGNING]: 'activity-mottagning',
                [ACTIVITIES.ADMIN]: 'activity-admin',
                [ACTIVITIES.RECEPT]: 'activity-recept',
                [ACTIVITIES.TELEFON]: 'activity-telefon',
                [ACTIVITIES.MOTE]: 'activity-mote',
                [ACTIVITIES.CHEFSTID]: 'activity-chefstid',
                [ACTIVITIES.LEDIG]: 'activity-ledig'
            };
            return map[activity] || 'activity-ledig';
        }
        
        // ============================================
        // BEMANNING CHECK
        // ============================================
        
        function countTeleqPerDay(day) {
            let count = 0;
            LUNCH_TIMES.forEach(time => {
                STAFF.forEach(person => {
                    if (isPersonWorking(person, day, time) && 
                        !isFixedSlot(person, day, time) &&
                        store.getActivity(person, day, time) === ACTIVITIES.TELEQ) {
                        count++;
                    }
                });
            });
            return count;
        }
        
        function checkBemanning() {
            const warnings = [];
            
            DAYS.forEach(day => {
                // Check TELEQ - should have exactly 2 slots per day (mån-ons, fre)
                if (day !== 'Tor') {
                    const teleqCount = countTeleqPerDay(day);
                    if (teleqCount < 2) {
                        warnings.push({
                            type: 'critical',
                            message: `⚠️ TeleQ saknas ${day} (${teleqCount}/2)`,
                            day
                        });
                    }
                }
                
                // Check AKUT coverage during important times
                TIME_SLOTS.forEach(time => {
                    if (!isLunchTime(time) && isImportantAkutTime(day, time)) {
                        const akutCount = STAFF.filter(person => 
                            isPersonWorking(person, day, time) && 
                            !isFixedSlot(person, day, time) &&
                            store.getActivity(person, day, time) === ACTIVITIES.AKUT
                        ).length;
                        
                        if (akutCount === 0) {
                            warnings.push({
                                type: 'critical',
                                message: `🚨 Akut saknas ${day} ${time}`,
                                day,
                                time
                            });
                        }
                    }
                });
                
                // Check lunch rules
                const lunchReceptCount = LUNCH_TIMES.filter(time => {
                    return STAFF.some(person => 
                        isPersonWorking(person, day, time) && 
                        !isFixedSlot(person, day, time) &&
                        store.getActivity(person, day, time) === ACTIVITIES.RECEPT
                    );
                }).length;
                
                if (lunchReceptCount > 1) {
                    warnings.push({
                        type: 'alert',
                        message: `⚠️ För många Recept under lunch ${day} (${lunchReceptCount}/1)`,
                        day
                    });
                }
            });
            
            return warnings;
        }
        
        function isImportantAkutTime(day, time) {
            const hour = parseInt(time.split(':')[0]);
            return hour >= 8 && hour < 17;
        }
        
        function validateLunchActivity(person, day, time, activity) {
            if (!isLunchTime(time)) return true;
            
            // Only Recept allowed during lunch
            if (activity !== ACTIVITIES.RECEPT && activity !== ACTIVITIES.LEDIG) {
                return false;
            }
            
            // Max 1 of 2 lunch slots can have Recept
            if (activity === ACTIVITIES.RECEPT) {
                const otherLunchTime = time === '12:00' ? '12:30' : '12:00';
                const otherActivity = store.getActivity(person, day, otherLunchTime);
                if (otherActivity === ACTIVITIES.RECEPT) {
                    return false;
                }
            }
            
            return true;
        }

        function validateWorkingHours(hours) {
            if (hours === 'Ledig') return true;

            const match = hours.match(/^(\d{2}:\d{2})-(\d{2}:\d{2})$/);
            if (!match) return false;

            const [, start, end] = match;
            const startMinutes = timeToMinutes(start);
            const endMinutes = timeToMinutes(end);
            const dayStart = timeToMinutes(TIME_SLOTS[0]);
            const dayEnd = timeToMinutes(TIME_SLOTS[TIME_SLOTS.length - 1]);

            return startMinutes >= dayStart &&
                endMinutes <= dayEnd &&
                startMinutes < endMinutes &&
                startMinutes % 30 === 0 &&
                endMinutes % 30 === 0;
        }
        
        // ============================================
        // COMPONENTS
        // ============================================
        
        function renderHeader() {
            return `
                <div class="bg-white border-b border-gray-200 shadow-sm">
                    <div class="max-w-full px-6 py-4">
                        <h1 class="text-2xl font-bold text-gray-900 mb-4">📋 Schemaläggning</h1>
                        <div class="flex gap-2">
                            <button onclick="app.setWeek('odd')" class="week-btn px-4 py-2 rounded-lg font-semibold transition-colors ${store.currentWeek === 'odd' ? 'bg-blue-600 text-white' : 'bg-gray-200 text-gray-700 hover:bg-gray-300'}">
                                Udda vecka
                            </button>
                            <button onclick="app.setWeek('even')" class="week-btn px-4 py-2 rounded-lg font-semibold transition-colors ${store.currentWeek === 'even' ? 'bg-blue-600 text-white' : 'bg-gray-200 text-gray-700 hover:bg-gray-300'}">
                                Jämn vecka
                            </button>
                        </div>
                    </div>
                </div>
            `;
        }
        
        function renderWarnings() {
            const warnings = checkBemanning();
            if (warnings.length === 0) return '<div class="bg-green-50 border border-green-200 rounded-lg p-4 text-green-800"><strong>✓ Bra bemanning!</strong> Alla kritiska tider är täckta.</div>';
            
            const critical = warnings.filter(w => w.type === 'critical');
            const alerts = warnings.filter(w => w.type === 'alert');
            
            let html = '<div class="space-y-2">';
            
            if (critical.length > 0) {
                html += '<div class="bg-red-50 border border-red-200 rounded-lg p-4"><div class="font-bold text-red-900 mb-2">🚨 Kritiska luckor:</div>';
                critical.slice(0, 5).forEach(w => {
                    html += `<div class="text-red-800 text-sm">${w.message}</div>`;
                });
                if (critical.length > 5) {
                    html += `<div class="text-red-700 text-sm font-semibold">... och ${critical.length - 5} fler</div>`;
                }
                html += '</div>';
            }
            
            if (alerts.length > 0) {
                html += '<div class="bg-yellow-50 border border-yellow-200 rounded-lg p-4"><div class="font-bold text-yellow-900 mb-2">⚠️ Varningar:</div>';
                alerts.slice(0, 3).forEach(w => {
                    html += `<div class="text-yellow-800 text-sm">${w.message}</div>`;
                });
                if (alerts.length > 3) {
                    html += `<div class="text-yellow-700 text-sm font-semibold">... och ${alerts.length - 3} fler</div>`;
                }
                html += '</div>';
            }
            
            html += '</div>';
            return html;
        }

        function renderDayTabs() {
            return `
                <div class="bg-white rounded-lg border border-gray-200 p-2">
                    <div class="flex flex-wrap gap-2">
                        ${DAYS.map(day => `
                            <button onclick="app.selectDay('${day}')" class="px-4 py-2 rounded-lg font-semibold transition-colors ${store.getCurrentDay() === day ? 'bg-blue-600 text-white' : 'bg-gray-200 text-gray-700 hover:bg-gray-300'}">
                                ${day}
                            </button>
                        `).join('')}
                    </div>
                </div>
            `;
        }
        
        function renderScheduleTable() {
            const day = store.getCurrentDay();
            let html = '<div class="overflow-x-auto bg-white rounded-lg shadow">';
            html += '<div class="schedule-grid min-w-max" style="grid-template-columns: 88px repeat(' + STAFF.length + ', minmax(110px, 1fr));">';
            html += `<div class="slot bg-gray-900 text-white font-bold">${day}</div>`;
            STAFF.forEach(person => {
                html += `<div class="slot bg-blue-600 text-white font-bold text-sm">${person}</div>`;
            });

            TIME_SLOTS.forEach(time => {
                const isLunch = isLunchTime(time);
                html += `<div class="slot ${isLunch ? 'lunch-slot' : 'bg-gray-100'} text-gray-700 font-bold text-xs">${time}</div>`;

                STAFF.forEach(person => {
                    const isWorking = isPersonWorking(person, day, time);
                    const isFixed = isFixedSlot(person, day, time);
                    const activity = store.getActivity(person, day, time);
                    
                    let slotContent = '';
                    
                    if (isFixed) {
                        const fixedName = getFixedSlotName(person, day, time);
                        slotContent = `<div class="slot-activity activity-mote px-1 text-xs leading-tight" title="${fixedName}">${fixedName}</div>`;
                    } else if (!isWorking) {
                        slotContent = `<div class="slot-activity activity-ledig">—</div>`;
                    } else {
                        let options = ACTIVITY_OPTIONS;
                        
                        // Limit options during lunch
                        if (isLunch) {
                            options = [ACTIVITIES.RECEPT, ACTIVITIES.LEDIG];
                        }
                        
                        // Only Josefine can have Chefstid
                        if (person !== 'Josefine') {
                            options = options.filter(a => a !== ACTIVITIES.CHEFSTID);
                        }
                        
                        slotContent = `
                            <select onchange="app.setActivity('${person}', '${day}', '${time}', this.value)" class="w-full h-full bg-transparent text-white font-bold text-xs cursor-pointer border-none focus:outline-none">
                                ${options.map(opt => `<option value="${opt}" ${activity === opt ? 'selected' : ''}>${opt}</option>`).join('')}
                            </select>
                        `;
                        slotContent = `<div class="slot-activity ${getActivityClass(activity)}">${slotContent}</div>`;
                    }
                    
                    html += `<div class="slot ${isLunch ? 'lunch-slot' : ''}">${slotContent}</div>`;
                });
            });
            
            html += '</div></div>';
            return html;
        }
        
        function renderStatistics() {
            let html = '<div class="space-y-4">';
            
            STAFF.forEach(person => {
                const stats = {};
                ACTIVITY_OPTIONS.forEach(act => stats[act] = 0);
                
                let totalSlots = 0;
                DAYS.forEach(day => {
                    TIME_SLOTS.forEach(time => {
                        if (isPersonWorking(person, day, time) && !isFixedSlot(person, day, time)) {
                            totalSlots++;
                            stats[store.getActivity(person, day, time)]++;
                        }
                    });
                });
                
                html += `<div class="bg-white p-4 rounded-lg border border-gray-200">
                    <h3 class="font-bold text-gray-900 mb-3">${person}</h3>
                    <div class="grid grid-cols-2 gap-2">`;
                
                ACTIVITY_OPTIONS.filter(a => a !== ACTIVITIES.LEDIG).forEach(activity => {
                    const count = stats[activity] || 0;
                    const pct = totalSlots > 0 ? Math.round((count / totalSlots) * 100) : 0;
                    html += `
                        <div class="text-sm">
                            <div class="flex justify-between mb-1">
                                <span class="font-semibold text-gray-700">${activity}</span>
                                <span class="font-bold">${pct}%</span>
                            </div>
                            <div class="w-full bg-gray-200 rounded-full h-2">
                                <div class="h-2 rounded-full ${getActivityClass(activity)}" style="width: ${pct}%"></div>
                            </div>
                        </div>
                    `;
                });
                
                html += `</div></div>`;
            });
            
            html += '</div>';
            return html;
        }
        
        function renderSettings() {
            let html = '<div class="space-y-4">';
            
            STAFF.forEach(person => {
                html += `<div class="bg-white p-4 rounded-lg border border-gray-200">
                    <h3 class="font-bold text-gray-900 mb-4">${person}</h3>`;
                
                ['odd', 'even'].forEach(week => {
                    html += `<div class="mb-4">
                        <div class="text-sm font-semibold text-gray-700 mb-2">${week === 'odd' ? 'Udda vecka' : 'Jämn vecka'}</div>
                        <div class="grid grid-cols-5 gap-2">`;
                    
                    DAYS.forEach(day => {
                        const hours = store.getWorkingHours(person, week, day);
                        html += `
                            <div>
                                <label class="text-xs text-gray-600 font-semibold block mb-1">${day}</label>
                                <input type="text" value="${hours}" placeholder="07:30-17:00" 
                                    onchange="app.setWorkingHours('${person}', '${week}', '${day}', this.value)"
                                    class="w-full px-2 py-1 border border-gray-300 rounded text-sm">
                            </div>
                        `;
                    });
                    
                    html += `</div></div>`;
                });
                
                html += `</div>`;
            });
            
            html += '</div>';
            return html;
        }
        
        // ============================================
        // APP
        // ============================================
        
        const app = {
            activeTab: 'schedule',
            
            setWeek(week) {
                store.setWeek(week);
            },

            selectDay(day) {
                store.setCurrentDay(day);
            },
            
            setActivity(person, day, time, activity) {
                if (!validateLunchActivity(person, day, time, activity)) {
                    alert('❌ Max 1 Recept under lunch (12:00-13:00)');
                    this.render();
                    return;
                }
                store.setActivity(person, day, time, activity);
            },
            
            setWorkingHours(person, week, day, hours) {
                if (!validateWorkingHours(hours)) {
                    alert(`Fel: ange arbetstid som HH:MM-HH:MM i 30-minuterssteg mellan ${TIME_SLOTS[0]} och ${TIME_SLOTS[TIME_SLOTS.length - 1]}, där starttiden är före sluttiden, eller Ledig`);
                    this.render();
                    return;
                }
                store.setWorkingHours(person, week, day, hours);
            },
            
            setTab(tab) {
                this.activeTab = tab;
                this.render();
            },
            
            render() {
                const appElement = document.getElementById('app');
                appElement.innerHTML = `
                    <div class="h-screen flex flex-col bg-gray-50">
                        ${renderHeader()}
                        
                        <div class="flex-1 overflow-hidden flex flex-col">
                            <!-- Tabs -->
                            <div class="bg-white border-b border-gray-200 px-6 py-3 flex gap-4">
                                <button onclick="app.setTab('schedule')" class="tab-btn px-4 py-2 rounded-lg font-semibold transition-colors ${this.activeTab === 'schedule' ? 'bg-blue-600 text-white' : 'bg-gray-200 text-gray-700 hover:bg-gray-300'}">📅 Schema</button>
                                <button onclick="app.setTab('stats')" class="tab-btn px-4 py-2 rounded-lg font-semibold transition-colors ${this.activeTab === 'stats' ? 'bg-blue-600 text-white' : 'bg-gray-200 text-gray-700 hover:bg-gray-300'}">📊 Statistik</button>
                                <button onclick="app.setTab('settings')" class="tab-btn px-4 py-2 rounded-lg font-semibold transition-colors ${this.activeTab === 'settings' ? 'bg-blue-600 text-white' : 'bg-gray-200 text-gray-700 hover:bg-gray-300'}">⚙️ Inställningar</button>
                            </div>
                            
                            <!-- Content -->
                            <div class="flex-1 overflow-auto p-6">
                                ${this.activeTab === 'schedule' ? `
                                    <div class="space-y-4">
                                        ${renderDayTabs()}
                                        <div class="bg-white p-4 rounded-lg border border-gray-200">
                                            ${renderWarnings()}
                                        </div>
                                        <div class="bg-yellow-50 border border-yellow-200 rounded-lg p-3 text-sm text-yellow-800">
                                            <strong>Lunch (12:00-13:00):</strong> Endast Recept tillåtet, max 1 av 2 halvtimmar
                                        </div>
                                        ${renderScheduleTable()}
                                    </div>
                                ` : ''}
                                
                                ${this.activeTab === 'stats' ? renderStatistics() : ''}
                                
                                ${this.activeTab === 'settings' ? renderSettings() : ''}
                            </div>
                        </div>
                    </div>
                `;
            }
        };
        
        // ============================================
        // INIT
        // ============================================
        
        store.subscribe(() => app.render());
        app.render();
    </script>
</body>
</html>
